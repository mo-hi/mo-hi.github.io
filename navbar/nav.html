<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Mo Hi">
    <title>nav css</title>
    <link rel="stylesheet" href="../basis/css/b.css">
    <link rel="stylesheet" href="css/navPage.css">
    <link rel="stylesheet" href="css/nav.css">
    <style>
        /* b.css override colors */
        :root, body.dark {
            --color-bg-body: var(--color-zinc-950);
            --color-bg-main: var(--color-zinc-900);
            --color-text: var(--color-zinc-100);

            --color-nav-bg: var(--color-gray-800); 
            --color-nav-down-bg: var(--color-gray-700); 
            --color-nav-font: var(--color-zinc-200);
    
            --color-nav-btn-bg:var(--color-blue-600);
            --color-nav-btn-font: white;

            --color-badge-bg: var(--color-gray-50);
            --color-badge-font: var(--color-gray-500);

            --color-badge-bg-checked: var(--color-cyan-100);
            --color-badge-font-checked: var(--color-cyan-900);

            --color-textarea-code-bg: var(--color-zinc-800);
            --color-textarea-code-text: var(--color-zinc-300);
            --color-textarea-code-border: var(--color-zinc-400);         
            --color-textarea-code-accent: var(--color-blue-500);
            --color-textarea-code-accent-glow: var(--color-blue-800);
            --color-textarea-code-scrollbar-thumb: var(--color-neutral-400);
            --color-textarea-code-scrollbar-thumb-hover: var(--color-neutral-600);


        }
    </style>
</head>
<!-- <body class="bulma-has-background-light bulma-container">   -->
<body class="dark">
    <main class="w-responsive-xl js-fill mt-0i">
        <!-- this navbar will be ovewritten by script (only for back up) -->
        <section id = "id-show">
            <div id="id-nav" class="">
                <nav>
                    <a href="https://mo-hi.github.io/">MoHi</a>
                    <a onclick="Reset(); Update()">Reset</a>
                    <a>...</a>
                    <div class="drop hover-toggle">
                        <a>DropDown</a>
                        <div class="down">
                            <a>Link 1</a>
                            <a>Link 2</a>
                            <a>Link 3</a>
                        </div>
                    </div>
                    <a class="nav-btn-blue">Button</a>
                </nav>
            </div>
        </section>

    <section class="p-10">
        <div id = 'id-status1' class="nav-status-bar mt-30i">
            <form id = 'id-form-position' class="multi-badge mr-30" onchange="Update(event)">
                <input type="checkbox" name="position" id="id-fixed" value="fixed">
                <label for="id-fixed">fixed</label>
            </form>
            <form id = 'id-form-interaction' class="multi-badge mr-30" onchange="Update(event)">
                <input type="radio" name="interaction" id="id-hover" value="hover" checked>
                <label for="id-hover">hover</label>

                <input type="radio" name="interaction" id="id-click" value="click">
                <label for="id-click">click</label>

                <input type="radio" name="interaction" id="id-autoclose" value="close">
                <label for="id-autoclose">click close</label>
            </form>
            <form id = 'id-form-navNum' class="multi-badge mr-30" onchange="Update(event)">
                <input type="radio" name="navNum" id="id-1" value="1" checked>
                <label for="id-1">1</label>

                <input type="radio" name="navNum" id="id-2" value="2">
                <label for="id-2">2</label>

                <input type="radio" name="navNum" id="id-3" value="3">
                <label for="id-3">3</label>
            </form>

            <form id = 'id-form-slimMode' class="multi-badge mr-30" onchange="Update(event)">
                <input type="radio" name="slimMode" id="id-normal" value="normal" checked>
                <label for="id-normal">Normal</label>

                <input type="radio" name="slimMode" id="id-compact" value="compact">
                <label for="id-compact">Compact</label>

                <input type="radio" name="slimMode" id="id-slim" value="slim">
                <label for="id-slim">Slim</label>
            </form>
            <form id = 'id-form-gapSize' class="multi-badge hidden" onchange="Update(event)">
                <input type="radio" name="gapSize" id="id-gap" value="0" checked>
                <label for="id-gap">no gap</label>

                <input type="radio" name="gapSize" id="id-gap10" value="10">
                <label for="id-gap10">gap-10</label>

                <input type="radio" name="gapSize" id="id-gap20" value="20">
                <label for="id-gap20">gap-20</label>
            </form>
            <div id = 'id-info-javascript-needed' class="hidden">
                Javascript needed
            </div>

        </div>
    </section>

    <section class="p-10">
        <p class="m-0 mb-5i">
            HTML of THIS navbar.
        </p> 
        <div id="id-show-out" class="h-420 w-80 js-fill mb-20i">
        </div>

        <textarea-js type="css"></textarea-js>

        <textarea-js type="js"></textarea-js>
    </section>

    <footer-js></footer-js>

    </main>  
</body>
    <!-- js libs -->
    <script src="../basis/js/b.js"> </script>
    <!-- this project -->
    <script src="js/nav.js"></script>

    <!-- this site (not needed to make nav.js work)-->
    <script>

    </script>
    <script src="../htmlElements.js"></script>
    <script src="js/pageLogic.js"></script>
    <script>
        Reset()
        // this ovverrides the html navbar above
        Update()
        // use this, when you manually change the nav html (for test purposes)
        // ShowHTMLinTextArea(document.getElementById("id-show"), document.getElementById("id-show-out"),false, false, "code")
    </script>
</html>
